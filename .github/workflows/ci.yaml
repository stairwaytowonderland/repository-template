name: CI

on:
  push:
    # Trigger 1: When main branch is updated (respects path ignores)
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - 'package.json'
      - 'package-lock.json'

    # Trigger 2: When a version tag is pushed
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      fail-on-no-release:
        description: 'Fail the workflow if no release is published (e.g. if there are no relevant commits).'
        type: boolean
        default: true
      publish:
        description: 'Whether to run in publish mode.'
        type: boolean

concurrency:
  group: '${{ github.repository_id }}-${{ github.ref_name }}'
  cancel-in-progress: true

# Use PAT instead of GITHUB_TOKEN to cause semantic-release to trigger tag pipeline when tag is created.
# 'Fine-grained token' repo permissions: Contents

jobs:
  check-if-first-commit:
    name: Check if this is the first commit
    if: github.event.before == '0000000000000000000000000000000000000000'
    runs-on: ubuntu-latest
    outputs:
      is-first-commit: ${{ steps.check.outputs.is-first-commit }}
    steps:
      - uses: actions/checkout@v6
      - name: Check if this is the first commit
        id: check
        run: |
          if [ $(git rev-list --count HEAD) -eq 1 ]; then
            echo "This is the first commit."
            echo "is-first-commit=true" >> $GITHUB_OUTPUT
          else
            echo "This is not the first commit."
            echo "is-first-commit=false" >> $GITHUB_OUTPUT
          fi
  release:
    name: Release
    if: startsWith(github.ref, 'refs/heads/main') && ! inputs.publish
    uses: ./.github/workflows/release.yaml
    secrets: inherit
    with:
      # dispatch-workflow: publish.yaml
      fail-on-no-release: ${{ inputs.fail-on-no-release == true }}

  publish:
    name: Publish
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish
    uses: ./.github/workflows/publish.yaml
    secrets: inherit
    with:
      tag: ${{ github.ref_name }}

  update-majorver:
    name: Update Major Version Tag
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - uses: nowactions/update-majorver@v1
