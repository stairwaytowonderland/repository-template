name: Import Issues from CSV

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      secret-token-name:
        description: 'Name of the repository secret containing the GitHub Personal Access Token with permissions to create issues (e.g. GH_PAT_CREATE_ISSUE)'
        required: true
        type: string
        default: 'GH_PAT_CREATE_ISSUE'

      dry-run:
        description: 'Dry run'
        required: true
        type: boolean
        default: true

      batch:
        description: 'Create issues in batches (by type)'
        required: true
        type: boolean
        default: true

      allow-duplicates:
        description: 'Allow creating duplicate issues'
        required: true
        type: boolean
        default: false

      allow-closed-duplicates:
        description: 'Allow creating duplicate issues for closed issues'
        required: true
        type: boolean
        default: false

      csv-path:
        description: 'Path (relative) to the CSV file'
        required: true
        type: string
        default: 'TODO.csv'

jobs:
  import-issues:
    name: Import Issues
    uses: stairwaytowonderland/actions/.github/workflows/import-csv-issues.yaml@v1.10.0
    secrets:
      github-token: ${{ secrets[github.event.inputs.secret-token-name] }}
    with:
      csv-path: ${{ github.event.inputs.csv-path }}
      dry-run: ${{ github.event.inputs.dry-run }}
      batch: ${{ github.event.inputs.batch }}
      allow-duplicates: ${{ github.event.inputs.allow-duplicates }}
      allow-closed-duplicates: ${{ github.event.inputs.allow-closed-duplicates }}
