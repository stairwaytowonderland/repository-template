name: Handle New Repository

on:
  repository_dispatch:
    types: [repository-created]

jobs:
  on-create:
    runs-on: ubuntu-latest
    steps:
      - name: Print Repository Details
        run: |
          echo "A new repository was created!"
          echo "Name: $CREATED_REPO_NAME"
          echo "Repository URL: $CREATED_REPO_URL"
          echo "Sender Login: $SENDER_REPO_LOGIN"
          echo "Sender URL: $SENDER_REPO_URL"
          echo "Sender ID: $SENDER_REPO_ID"
          echo "Sender Type: $SENDER_REPO_TYPE"
        env:
          CREATED_REPO_NAME: ${{ github.event.client_payload.repository.name }}
          CREATED_REPO_URL: ${{ github.event.client_payload.repository.url }}
          SENDER_REPO_FULL_NAME: ${{ github.event.client_payload.sender.full_name }}
          SENDER_REPO_URL: ${{ github.event.client_payload.sender.html_url }}
          SENDER_REPO_LOGIN: ${{ github.event.client_payload.sender.owner.login }}
          SENDER_REPO_ID: ${{ github.event.client_payload.sender.owner.id }}
          SENDER_REPO_TYPE: ${{ github.event.client_payload.sender.owner.type }}
