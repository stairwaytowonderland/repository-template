name: _

on:
  repository_dispatch:
    types: [repository-created]

jobs:
  check-if-first-commit:
    name: Check if this is the first commit
    uses: stairwaytowonderland/actions/.github/actions/first-commit-action@v1

  on-create:
    name: Repository Created
    needs: [check-if-first-commit]
    if: needs.check-if-first-commit.outputs.is-first-commit == 'true'
    uses: stairwaytowonderland/actions/.github/workflows/repository-created.yaml@v1
    with:
      repo: ${{ github.event.client_payload.repository.name }}
      url: ${{ github.event.client_payload.repository.url }}
      sender: ${{ github.event.client_payload.sender.login }}
      sender-id: ${{ github.event.client_payload.sender.id }}
