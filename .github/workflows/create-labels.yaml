name: Create Labels

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run'
        required: true
        type: boolean
        default: true
      update-existing:
        description: 'Whether to update existing labels (e.g. rename, change color/description).'
        required: true
        type: boolean
        default: false
      ref:
        description: 'Git ref of the shared actions repo to use (e.g. main or a specific tag/commit)'
        required: false
        type: string
        default: 'v1'

jobs:
  create-labels:
    name: Ensure only needed labels exist
    uses: stairwaytowonderland/actions/.github/workflows/create-labels.yaml@v1
    with:
      ref: ${{ inputs.ref }}
      dry-run: ${{ inputs.dry-run }}
      update-existing: ${{ inputs.update-existing }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
