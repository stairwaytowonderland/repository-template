name: Create Labels

on:
  repository_dispatch:
    types: [create-labels]

  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run'
        type: boolean
        default: true
      update-existing:
        description: 'Whether to update existing labels (e.g. rename, change color/description).'
        type: boolean

jobs:
  create-labels:
    name: Create Labels
    # if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    uses: stairwaytowonderland/label-management/.github/workflows/create-labels.yaml@v1
    with:
      dry-run: ${{ inputs.dry-run || false }}
      update-existing: ${{ inputs.update-existing || false }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
