# GitHub Issue Forms configuration
blank_issues_enabled: false
template_sync:
  types:
    - name: bug-report
      about: Create an issue to report a bug or unexpected behavior.
      title: '[Bug] <short summary>'
      labels: [bug]
    - name: feature-request
      about: Create an issue to suggest a new feature or improvement.
      title: '[Feature] <short summary>'
      labels: [enhancement]
    - name: documentation
      about: Create an issue to suggest improvements or additions to documentation.
      title: '[Documentation] <short summary>'
      labels: [documentation]
    - name: task
      about: Create an issue for a general task or chore.
      title: '[Task] <short summary>'
      labels: [task]
  labels:
    documentation: documentation
    feature-request: enhancement
    bug-report: bug
    task: task
contact_links:
  - name: Project Documentation
    url: https://github.com/your-org/your-repo/wiki
    about: Please check the project documentation for common questions.
  - name: Security Policy
    url: https://github.com/your-org/your-repo/security/policy
    about: Please report security vulnerabilities here.
