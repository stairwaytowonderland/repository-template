name: Task
description: Track a general task or chore
title: "[Task] <short summary>"
labels: [ task ]
type: task
body:
  - type: markdown
    attributes:
      value: |
        ## Task
        Describe the task or chore to be completed.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
      placeholder: Describe the task in detail.
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low
      description: How important is this task?
    validations:
      required: false
  - type: dropdown
    id: effort
    attributes:
      label: Estimated Effort
      options:
        - Small
        - Medium
        - Large
      description: How much effort do you estimate this will take?
    validations:
      required: false
